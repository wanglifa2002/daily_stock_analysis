instructions: |
  **国家战略瓶颈未兑现龙头策略**

  ### 适用范围
  - 仅适用于 **A 股主板与创业板**。
  - 直接排除：**科创板、北交所、港股、ST/退市风险股**。
  - 交易目标：寻找“**国家战略必要性 + 产业链瓶颈 + 未兑现预期差**”同时成立的龙头或准龙头。

  ### 一、国家战略主题白名单（优先级从高到低）
  优先关注以下方向，并在结论中说明该股票对应的一级主题与二级环节：

  1. **基础战略性产业**：
     - 新一代信息技术
     - 新能源
     - 新材料
     - 智能网联新能源汽车
     - 机器人
     - 高端装备

  2. **新兴支柱产业**：
     - 集成电路：先进制程制造、关键设备（刻蚀/薄膜）、HBM 存储、光刻胶
     - 航空航天：卫星载荷、火箭发动机、机载系统
     - 生物医药：小核酸药物、基因治疗、脑机接口医疗设备
     - 低空经济：飞控系统、适航认证环节、空管雷达
     - 新型储能：PCS、BMS、温控系统
     - 智能机器人：行星滚柱丝杠、空心杯电机、力矩传感器

  3. **未来产业**：
     - 量子科技：稀释制冷机、单光子源、量子芯片
     - 生物制造：菌种构建、发酵工艺
     - 绿色氢能 / 核聚变能：电解槽、储氢瓶、偏滤器、第一壁材料、超导磁体
     - 脑机接口：电极、采集芯片、解码算法
     - 具身智能：具身大模型、多模态感知
     - 6G：薄膜铌酸锂、射频前端

  若股票只属于“跟风概念”而非战略必选环节，应显著降分。

  ### 二、龙头 / 准龙头判定（满足 2 条）
  1. 国内细分市场市占率前 3，或市占率 > 15%。
  2. 已进入国家级重大工程供应链，或为头部客户一级供应商。
  3. 具备明显技术壁垒：核心专利、卡脖子属性、产品国产化率显著偏低。
  4. 产能规模国内前 3，或扩产项目获得省级及以上重点支持。

  ### 三、未兑现判定（4 选 3）
  1. **涨幅未透支**：60 日涨幅 < 30%，120 日涨幅 < 50%，250 日涨幅 < 100%。
  2. **估值未泡沫**：PE 分位 < 70%，或 PS < 行业平均 1.5 倍。
  3. **市值未头部**：总市值未进入行业前 10%。
  4. **换手未过热**：近 20 日日均换手率 < 8%。

  ### 四、预期差判定（满足 1 条）
  1. 最近 30 日存在中标 / 验证 / 政策 / 订单催化，但股价涨幅 < 15%，未出现连续放量大涨。
  2. 最近 30 日卖方研报数量较少，或缺少头部券商深度覆盖。
  3. 若存在可用数据，北向 / 融资未明显抢跑；若无直接数据，降级为“证据不足，不加分”。

  ### 五、产业链瓶颈判定（满足任意 2 条）
  - 国产化率低（<30%）
  - 扩产周期长（>2 年）
  - 客户认证周期长（>18 个月）
  - 替代成本高
  - 供应商数量少（全球 <5 家）
  - 上游卡脖子 / 海外垄断严重

  ### 六、资金雷达四阶段（第一版使用量价替代法）
  使用 `get_daily_history`、`analyze_trend`、`get_sector_rankings`、`search_stock_news` 联合判断：

  1. **吸筹区**（满足 4 条中的 3 条）
     - 价格横盘或温和下跌，ATR / 波动率低于近期均值
     - 成交量持续缩量，低于 60 日均量
     - MACD 零轴下方走平或出现底背离
     - 新闻热度低于板块平均水平

  2. **主升区初期**（满足 4 条中的 3 条）
     - 股价放量突破 60 日线或前期平台
     - 连续 3 日成交量 > 60 日均量的 1.5 倍
     - 同板块至少 3 只个股出现共振形态
     - 换手率温和放大至 5%-10%

  3. **分歧区**（满足 3 条中的 2 条）
     - 高位震荡，冲高回落次数增多
     - 放量滞涨
     - MACD 顶背离或 RSI > 80 后回落

  4. **派发区**（满足 4 条中的 3 条）
     - 跌破 20 日线且反抽无力
     - 缩量下跌或放量下跌
     - 利好密集但股价不涨
     - 板块龙头开始领跌

  只有 **吸筹区末期** 或 **主升区初期** 才可积极考虑买入；派发区直接否决。

  ### 七、入场条件（A≥2，B≥1，C≥1，且 D=0）

  **A 类硬条件（至少 2 项）**
  - 股价位于 EXPMA60、BOLL 下轨或筹码密集区上方 5% 以内
  - RSI(14) < 40 或从低位上穿 30
  - KDJ < 20 后金叉 / 底背离
  - 出现锤头线、十字星、阳包阴等止跌 K 线

  **B 类量价 / 资金条件（至少 1 项）**
  - 连续 3 日放量 > 60 日均量 1.2 倍，或缩量后单日倍量
  - 若有资金流数据，特大单连续 3 日净流入
  - 板块指数站稳 20 日线，且板块内已有领涨股

  **C 类催化 / 估值条件（至少 1 项）**
  - 最近 30 日内出现中标 / 验证 / 政策 / 订单催化
  - 催化已出现但股价反应不充分（30 日涨幅 < 15%）
  - PE 分位 < 70%，且 PEG < 2；若无 PEG，使用行业平均 PE 做近似判断

  **D 类否决项（任意 1 项即放弃）**
  - 已持仓且本金亏损达到 -5%
  - 年报预亏、ST 风险、重大业绩暴雷
  - 核心逻辑证伪：政策取消、订单失败、技术被替代
  - 重大违法违规、立案调查
  - 科创板 / 北交所 / 港股

  ### 八、出场与风控
  - **硬止损**：本金亏损达到 -5%，无条件清仓，不可补仓。
  - **技术破位**：跌破关键支撑位且次日不能收复，减仓或离场。
  - **逻辑证伪**：政策、订单、技术路线被证伪时立即离场。
  - **移动止盈**：从最高点回撤 15%-20% 时先减仓；若回撤至成本价上方 5% 保护线，则清仓。
  - **仓位控制**：单票不超过 10%，单板块不超过 30%。若系统无法读取组合持仓，仅在建议中给出仓位提醒。

  ### 九、缺失数据的第一版降级替代
  - 主力资金：用量比 + 成交额 + 换手率组合替代。
  - 融资余额：暂无直接接口时不作刚性条件，只作为新闻侧面证据。
  - 北向资金：暂无直接接口时不作刚性条件，只在新闻中辅助判断。
  - ETF 份额：用板块指数走势 + 板块成交量替代。
  - PEG 分位：用 PE 与行业平均比较替代。
  - 国产化率 / 市占率：若缺少结构化数据，只能在新闻与公开资料出现明确证据时加分；证据不足时必须降低置信度，不能臆断。

  ### 十、输出要求
  - 在结论中必须明确说明：
    1. 股票对应的国家战略主题 / 产业环节；
    2. 是否属于龙头 / 准龙头；
    3. 是否满足“未兑现”与“预期差”；
    4. 当前量价阶段属于吸筹 / 主升 / 分歧 / 派发中的哪一类；
    5. 主要风险与否决项是否存在。
  - 若证据链不足，必须明确给出“观望 / 继续跟踪”的结论，不得为了给建议而强行看多。
  - 在 `buy_reason` 中注明“国家战略瓶颈未兑现龙头策略”的判断结果。

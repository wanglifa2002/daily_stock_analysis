# Strategic Bottleneck Undervalued Leader Strategy / 国家战略瓶颈未兑现龙头策略
# Focuses on A-share main board / ChiNext companies that align with national strategy,
# occupy bottleneck links in the industrial chain, and have not yet been fully priced by the market.

name: strategic_bottleneck_undervalued_leader
display_name: 国家战略瓶颈未兑现龙头策略
description: 聚焦 A 股主板/创业板中具备国家战略必要性、产业链瓶颈属性与未兑现预期差的龙头或准龙头。
